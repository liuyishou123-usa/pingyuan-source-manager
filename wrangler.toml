name = "pingyuan-source-manager"
main = "src/index.js"
compatibility_date = "2024-01-01"

# KV 命名空间绑定 - 用于存储视频源配置
[[kv_namespaces]]
binding = "SOURCES_KV"
id = "YOUR_KV_NAMESPACE_ID"
preview_id = "YOUR_KV_PREVIEW_ID"

# 环境变量
[env.production]
vars = { ENVIRONMENT = "production" }

[env.development]
vars = { ENVIRONMENT = "development" }

# 触发器 - 定时任务
[[triggers.crons]]
crons = ["0 */6 * * *"]  # 每6小时执行一次
